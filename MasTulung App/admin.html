<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin - TulangTulung Gombong</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', Tahoma, Geneva, sans-serif; background-color: #ecf0f1; margin: 0; padding: 0; }
        
        /* LOGIN ADMIN */
        #login-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; }
        .login-box { background: white; padding: 30px; border-radius: 15px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.3); width: 300px; }
        .login-box h2 { margin-top: 0; color: #27ae60; font-weight: 800; }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; font-weight: bold; font-family: inherit;}
        .login-box button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; font-family: inherit;}
        
        /* DASHBOARD ADMIN */
        .header { background-color: #2c3e50; color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header h2 { margin: 0; font-weight: 800;}
        .header span { color: #f1c40f; }
        
        .tab-menu { display: flex; background: #1a252f; padding: 10px 20px; gap: 10px; flex-wrap: wrap; }
        .tab-btn { background: none; border: none; color: white; padding: 10px 20px; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; opacity: 0.6; transition: 0.3s; flex: 1; min-width: 150px; font-family: inherit;}
        .tab-btn.active { background: #f1c40f; color: #2c3e50; opacity: 1; }

        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        
        /* KOTAK STATISTIK RINGKAS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: white; padding: 20px; border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-bottom: 5px solid #ddd; }
        .stat-box.green { border-color: #27ae60; }
        .stat-box.blue { border-color: #3498db; }
        .stat-box.gold { border-color: #f39c12; background: linear-gradient(135deg, #fffcf0, #fff); }
        .stat-box.purple { border-color: #8e44ad; background: linear-gradient(135deg, #f9f0ff, #fff); }
        
        .stat-angka { font-size: 30px; font-weight: 800; color: #2c3e50; margin-top: 5px; }
        .stat-label { font-size: 11px; color: #7f8c8d; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }

        /* SEARCH BAR & EXPORT BUTTON */
        .search-bar { width: 100%; padding: 15px; border: 2px solid #bdc3c7; border-radius: 8px; font-size: 15px; box-sizing: border-box; margin-bottom: 20px; font-weight: bold; font-family: inherit;}
        .search-bar:focus { border-color: #3498db; outline: none; }
        .btn-excel { background-color: #1d6f42; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; font-family: inherit;}
        .btn-excel:hover { background-color: #155530; }

        /* GRID KARTU */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 5px solid #ddd; position: relative; }
        .card.pending { border-color: #f39c12; }
        .card.aktif { border-color: #27ae60; }
        .card.suspend { border-color: #e74c3c; }
        
        .card-title { font-size: 16px; font-weight: 800; color: #2c3e50; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;}
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 800; color: white; letter-spacing: 0.5px;}
        .bg-pending { background: #f39c12; } .bg-aktif { background: #27ae60; } .bg-suspend { background: #e74c3c; }
        
        .card-detail { font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 600;}
        .saldo-text { font-size: 18px; font-weight: 800; color: #2980b9; margin: 10px 0; }

        /* FORM TOP-UP */
        .topup-box { background: #e8f5e9; padding: 12px; border-radius: 8px; margin-top: 15px; border: 1.5px dashed #27ae60; }
        .topup-box input { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-family: inherit; font-weight: bold;}
        .btn-topup { width: 100%; background: #27ae60; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: inherit;}

        /* TOMBOL AKSI */
        .action-btns { display: flex; gap: 10px; margin-top: 15px; }
        .btn-setuju { flex: 1; background: #3498db; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: inherit;}
        .btn-suspend { flex: 1; background: #e74c3c; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; font-family: inherit;}
        .btn-hapus { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: bold; font-family: inherit;}

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="login-box">
        <h2>Admin TulangTulung</h2>
        <p style="color:#7f8c8d; font-size:13px; font-weight:600;">Masukkan PIN Rahasia</p>
        <input type="password" id="adminPin" placeholder="••••••">
        <button onclick="loginAdmin()">MASUK SISTEM</button>
    </div>
</div>

<div id="dashboard-admin" class="hidden">
    <div class="header">
        <h2>🛠️ Panel <span>CEO</span></h2>
        <button onclick="keluarAdmin()" style="background:#e74c3c; color:white; border:none; padding:8px 16px; border-radius:8px; font-weight:bold; cursor:pointer; font-family:inherit;">Keluar</button>
    </div>

    <div class="tab-menu">
        <button class="tab-btn active" id="btn-tab-driver" onclick="bukaTab('driver')">👥 Data Mitra Driver</button>
        <button class="tab-btn" id="btn-tab-order" onclick="bukaTab('order')">📦 Pantau Orderan</button>
    </div>

    <div class="container">
        
        <div class="stats-grid">
            <div class="stat-box green">
                <div class="stat-label">Total Orderan Beres</div>
                <div class="stat-angka" id="adminStatOrder">0</div>
            </div>
            <div class="stat-box blue">
                <div class="stat-label">Total Mitra Aktif</div>
                <div class="stat-angka" id="adminStatDriver">0</div>
            </div>
            <div class="stat-box gold">
                <div class="stat-label">Total Saldo Ngendap (Milik Driver)</div>
                <div class="stat-angka" id="adminStatSaldo">Rp 0</div>
            </div>
            <div class="stat-box purple">
                <div class="stat-label">Total Pemasukan Admin (Rp 1.000/Order)</div>
                <div class="stat-angka" id="adminStatPendapatan" style="color: #8e44ad;">Rp 0</div>
            </div>
        </div>

        <div id="tab-driver">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #2c3e50; font-weight: 800;">Daftar Mitra Driver</h3>
            </div>
            <input type="text" id="searchDriver" class="search-bar" placeholder="🔍 Cari Nama utawa Nomer WA Driver..." onkeyup="renderDrivers()">
            
            <div class="grid-container" id="listDrivers">
                </div>
        </div>

        <div id="tab-order" class="hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;">
                <h3 style="margin: 0; color: #2c3e50; font-weight: 800;">Riwayat Pesenan (Real-time)</h3>
                <button class="btn-excel" onclick="exportToCSV()">📥 Download Laporan (.csv)</button>
            </div>
            <div class="grid-container" id="listOrders">
                </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // ── FIREBASE ASLI TULANGTULUNG GOMBONG ──
    const firebaseConfig = {
        apiKey: "AIzaSyC04vDd6Z1NnrMx5gK7nMCyDceaGZj_bQw",
        authDomain: "mastulungmasgombong.firebaseapp.com",
        databaseURL: "https://mastulungmasgombong-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mastulungmasgombong",
        storageBucket: "mastulungmasgombong.firebasestorage.app",
        messagingSenderId: "4547691331",
        appId: "1:4547691331:web:45ecd39aab90f45b4f25f6",
        measurementId: "G-MCYH7YMQXQ"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // VARIABEL GLOBAL UNTUK PENCARIAN & EXPORT
    let allDriversData = [];
    let allOrdersData = [];

    // LOGIKA LOGIN SEDERHANA
    const PIN_ADMIN = "admin123";

    window.loginAdmin = function() {
        const pin = document.getElementById('adminPin').value;
        if(pin === PIN_ADMIN) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-admin').classList.remove('hidden');
            muatDataDriver();
            muatDataOrder();
        } else {
            alert("PIN Salah! Coba lagi.");
        }
    }

    window.keluarAdmin = function() {
        document.getElementById('dashboard-admin').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
        document.getElementById('adminPin').value = "";
    }

    // LOGIKA PINDAH TAB
    window.bukaTab = function(namaTab) {
        document.getElementById('btn-tab-driver').classList.remove('active');
        document.getElementById('btn-tab-order').classList.remove('active');
        document.getElementById('tab-driver').classList.add('hidden');
        document.getElementById('tab-order').classList.add('hidden');

        document.getElementById(`btn-tab-${namaTab}`).classList.add('active');
        document.getElementById(`tab-${namaTab}`).classList.remove('hidden');
    }

    // ==========================================
    // BAGIAN 1: MANAJEMEN DRIVER 
    // ==========================================
    function muatDataDriver() {
        console.log("Memulai penarikan data driver...");
        const driversRef = ref(database, 'drivers');
        onValue(driversRef, (snapshot) => {
            console.log("Respons database driver diterima:", snapshot.val());
            allDriversData = [];
            let totalAktif = 0;
            let totalSaldoSistem = 0;

            if(snapshot.exists()) {
                snapshot.forEach((child) => { 
                    const data = child.val() || {};
                    data.wa = child.key || '00'; // Simpan WA sbg key
                    allDriversData.push(data); 

                    // Hitung Statistik
                    if(data.status === 'aktif') totalAktif++;
                    totalSaldoSistem += (data.saldo || 0);
                });
            }
            
            // Update UI Statistik
            document.getElementById('adminStatDriver').innerText = totalAktif;
            document.getElementById('adminStatSaldo').innerText = "Rp " + totalSaldoSistem.toLocaleString('id-ID');

            renderDrivers(); // Panggil fungsi cetak UI
        }, (error) => {
            console.error("Gagal menarik data driver:", error);
        });
    }

    // Fungsi Render UI Daftar Driver dengan Filter Pencarian
    window.renderDrivers = function() {
        const listDiv = document.getElementById('listDrivers');
        listDiv.innerHTML = "";
        
        const keyword = document.getElementById('searchDriver').value.toLowerCase();

        // Saring array driver berdasarkan input pencarian
        const filteredDrivers = allDriversData.filter(d => 
            (d.nama || '').toLowerCase().includes(keyword) || 
            (d.wa || '').includes(keyword)
        );

        if(filteredDrivers.length === 0) {
            listDiv.innerHTML = "<p style='color:#7f8c8d; font-style:italic;'>Ora ana driver sing ditemokna.</p>"; return;
        }

        filteredDrivers.forEach((data) => {
            const wa = data.wa || '00';
            const safeStatus = data.status || 'pending';
            
            let badgeClass = safeStatus === 'aktif' ? 'bg-aktif' : safeStatus === 'suspend' ? 'bg-suspend' : 'bg-pending';
            let saldoText = (data.saldo || 0).toLocaleString('id-ID');

            let tombolAksi = "";
            if(safeStatus === 'pending') {
                tombolAksi = `<button class="btn-setuju" onclick="ubahStatusDriver('${wa}', 'aktif')">✅ Setujui (Aktifkan)</button>`;
            } else if(safeStatus === 'aktif') {
                tombolAksi = `<button class="btn-suspend" onclick="ubahStatusDriver('${wa}', 'suspend')">⛔ Suspend Akun</button>`;
            } else if(safeStatus === 'suspend') {
                tombolAksi = `<button class="btn-setuju" onclick="ubahStatusDriver('${wa}', 'aktif')">✅ Buka Suspend (Aktifkan)</button>`;
            }

            let formTopUp = "";
            if(safeStatus !== 'pending') {
                formTopUp = `
                    <div class="topup-box">
                        <div style="font-size:12px; margin-bottom:5px; font-weight:800; color:#1e7e34;">Isi Saldo Driver:</div>
                        <input type="number" id="topup-${wa}" placeholder="Ketik nominal (misal: 10000)">
                        <button class="btn-topup" onclick="isiSaldo('${wa}', ${data.saldo || 0})">💰 Tambah Saldo</button>
                    </div>
                `;
            }

            const card = document.createElement('div');
            card.className = `card ${safeStatus}`;
            card.innerHTML = `
                <div class="card-title">
                    <span>${data.nama || 'Tanpa Nama'}</span>
                    <span class="badge ${badgeClass}">${safeStatus.toUpperCase()}</span>
                </div>
                <div class="card-detail">📱 WA: <b><a href="https://wa.me/62${wa.substring(1)}" target="_blank" style="color:#2980b9; text-decoration:none;">${wa}</a></b></div>
                <div class="card-detail">📅 Daftar: ${data.tanggal_daftar || '-'}</div>
                <div class="saldo-text">Saldo: Rp ${saldoText}</div>
                
                ${formTopUp}

                <div class="action-btns">
                    ${tombolAksi}
                </div>
            `;
            listDiv.appendChild(card);
        });
    }

    window.ubahStatusDriver = function(wa, statusBaru) {
        if(confirm(`Yakin ingin mengubah status driver ini menjadi ${statusBaru.toUpperCase()}?`)) {
            update(ref(database, `drivers/${wa}`), { status: statusBaru })
                .then(() => alert("Status berhasil diubah!"))
                .catch(e => alert("Gagal: " + e));
        }
    }

    window.isiSaldo = function(wa, saldoSaatIni) {
        const inputNominal = document.getElementById(`topup-${wa}`).value;
        const nominal = parseInt(inputNominal);

        if(!nominal || nominal <= 0) {
            alert("Masukkan angka nominal yang benar!"); return;
        }

        if(confirm(`Yakin ingin menambahkan Rp ${nominal.toLocaleString('id-ID')} ke akun ini?`)) {
            const saldoBaru = saldoSaatIni + nominal;
            update(ref(database, `drivers/${wa}`), { saldo: saldoBaru })
                .then(() => {
                    alert("Berhasil! Saldo driver otomatis bertambah.");
                    document.getElementById(`topup-${wa}`).value = ""; 
                })
                .catch(e => alert("Gagal isi saldo: " + e));
        }
    }

    // ==========================================
    // BAGIAN 2: PANTAU ORDERAN & EXPORT EXCEL
    // ==========================================
    function muatDataOrder() {
        console.log("Memulai penarikan data pesanan...");
        const ordersRef = ref(database, 'orders');
        onValue(ordersRef, (snapshot) => {
            console.log("Respons database pesanan diterima:", snapshot.val());
            const listDiv = document.getElementById('listOrders');
            listDiv.innerHTML = "";
            allOrdersData = [];
            let totalOrderSelesai = 0;
            
            if(snapshot.exists()) {
                snapshot.forEach((child) => { 
                    const data = child.val() || {};
                    data.id = child.key;
                    allOrdersData.push(data); 

                    // Hitung Statistik Pemasukan (Dari orderan yang Selesai)
                    if(data.status === 'selesai') {
                        totalOrderSelesai++;
                    }
                });
            }

            // Update UI Statistik Orderan & Pemasukan
            document.getElementById('adminStatOrder').innerText = totalOrderSelesai;
            
            // LOGIKA PEMASUKAN ADMIN: Order Selesai x Rp 1.000
            const totalPemasukanAdmin = totalOrderSelesai * 1000;
            document.getElementById('adminStatPendapatan').innerText = "Rp " + totalPemasukanAdmin.toLocaleString('id-ID');

            // Render Kartu Orderan
            allOrdersData.reverse(); // Terbaru di atas
            if(allOrdersData.length === 0) {
                listDiv.innerHTML = "<p style='font-weight:600; color:#7f8c8d;'>Database orderan masih kosong.</p>"; return;
            }

            allOrdersData.forEach((data) => {
                const safeStatus = data.status || 'pending';
                let statusColor = safeStatus === 'selesai' ? '#27ae60' : safeStatus === 'batal' || safeStatus === 'batal_cust' ? '#e74c3c' : safeStatus === 'diambil' ? '#2980b9' : '#f39c12';
                
                let waktuTampil = data.waktu_order || ''; 
                if (data.timestamp) {
                    const dt = new Date(data.timestamp);
                    const tgl = dt.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
                    const jam = dt.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
                    waktuTampil = `${tgl} - ${jam} WIB`;
                }

                // LOGIKA MENAMPILKAN ULASAN JIKA ADA
                let ulasanHtml = data.ulasan ? `
                    <div class="card-detail" style="margin-top:10px; background:#fdf2e9; padding:12px; border-radius:8px; border-left:4px solid #8e44ad; color:#8e44ad; font-style:italic; font-weight:700;">
                        💬 <b>Ulasan Pelanggan:</b><br>"${data.ulasan}"
                    </div>
                ` : '';

                const customerWA = data.customer_wa || '00';

                const card = document.createElement('div');
                card.className = "card";
                card.innerHTML = `
                    <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                        <span style="font-size:11px; color:#7f8c8d; font-weight:800;">${waktuTampil}</span>
                        <span style="font-size:11px; font-weight:800; color:${statusColor}; text-transform:uppercase; padding:3px 8px; border-radius:12px; border:1px solid ${statusColor}40; background:${statusColor}10;">${safeStatus}</span>
                    </div>
                    <div class="card-title" style="font-size: 16px;">${data.layanan || 'Layanan Tidak Diketahui'}</div>
                    <div class="card-detail">👤 Cust: ${data.customer_nama || 'Tanpa Nama'} (<a href="https://wa.me/62${customerWA.substring(1)}" target="_blank" style="color:#2980b9; text-decoration:none;">${customerWA}</a>)</div>
                    <div class="card-detail">🛵 Driver: <b>${data.driver_nama || 'Belum ada'}</b> ${data.rating ? ' (⭐'+data.rating+')' : ''}</div>
                    <div class="card-detail" style="margin-top:12px; background:#f8f9fa; padding:10px; border-radius:6px; border:1px solid #eee;">
                        ${data.detail_1 || '-'} <br><span style="color:#bdc3c7;">⬇</span><br> ${data.detail_2 || '-'}
                    </div>
                    ${data.catatan ? `<div class="card-detail" style="margin-top:8px; color:#d35400; font-weight:700; background:#fff3e0; padding:8px; border-radius:6px;">📝 Catatan: ${data.catatan}</div>` : ''}
                    
                    ${ulasanHtml}
                    
                    <div style="margin-top:15px; text-align:right;">
                        <button class="btn-hapus" onclick="hapusOrder('${data.id}')">🗑️ Hapus Data Lama</button>
                    </div>
                `;
                listDiv.appendChild(card);
            });
        }, (error) => {
            console.error("Gagal menarik data pesanan:", error);
        });
    }

    // FUNGSI DOWNLOAD KE EXCEL (.CSV)
    window.exportToCSV = function() {
        if(allOrdersData.length === 0) { alert("Belum ada data pesanan untuk di-download."); return; }
        
        let csvContent = "Tanggal & Waktu,Layanan,Status,Nama Customer,WA Customer,Nama Driver,Detail 1 (Penjemputan),Detail 2 (Tujuan),Catatan,Bintang (Rating),Ulasan\n";
        
        allOrdersData.forEach(o => {
            let waktuStr = o.waktu_order || "";
            if(o.timestamp) {
                let dt = new Date(o.timestamp);
                waktuStr = dt.toLocaleDateString('id-ID') + " " + dt.toLocaleTimeString('id-ID');
            }
            
            let lay = `"${(o.layanan||"").replace(/"/g, '""')}"`;
            let stat = `"${(o.status||"").replace(/"/g, '""')}"`;
            let cNama = `"${(o.customer_nama||"").replace(/"/g, '""')}"`;
            let cWa = `"${(o.customer_wa||"").replace(/"/g, '""')}"`;
            let dNama = `"${(o.driver_nama||"").replace(/"/g, '""')}"`;
            let d1 = `"${(o.detail_1||"").replace(/"/g, '""')}"`;
            let d2 = `"${(o.detail_2||"").replace(/"/g, '""')}"`;
            let cat = `"${(o.catatan||"").replace(/"/g, '""')}"`;
            let rat = o.rating || "";
            let uls = `"${(o.ulasan||"").replace(/"/g, '""')}"`;

            csvContent += `${waktuStr},${lay},${stat},${cNama},${cWa},${dNama},${d1},${d2},${cat},${rat},${uls}\n`;
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        const url = URL.createObjectURL(blob);
        link.setAttribute("href", url);
        link.setAttribute("download", "Laporan_TTG_" + new Date().toLocaleDateString('id-ID') + ".csv");
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    window.hapusOrder = function(id) {
        if(confirm("Yakin hapus data pesanan ini secara permanen?")) {
            remove(ref(database, `orders/${id}`))
                .then(() => console.log("Terhapus"))
                .catch(e => alert("Gagal hapus: " + e));
        }
    }

</script>
</body>
</html>
