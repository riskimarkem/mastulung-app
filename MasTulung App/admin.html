<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Mas Tulung</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .header { background-color: #2980b9; color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h2 { margin: 0; }
        
        /* Kartu Statistik */
        .stats-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-bottom: 4px solid #ddd; }
        .stat-card.blue { border-color: #3498db; }
        .stat-card.yellow { border-color: #f1c40f; }
        .stat-card.green { border-color: #2ecc71; }
        .stat-angka { font-size: 32px; font-weight: bold; margin: 10px 0; color: #2c3e50; }

        /* Tabel Data */
        .table-container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background-color: #f8f9fa; color: #333; font-weight: bold; }
        
        /* Badge Status */
        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .badge.terbuka { background-color: #fff3cd; color: #856404; }
        .badge.diambil { background-color: #cce5ff; color: #004085; }
        .badge.selesai { background-color: #d4edda; color: #155724; }

        .btn-aksi { background-color: #27ae60; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-aksi:hover { background-color: #2ecc71; }
        .btn-batal { background-color: #e74c3c; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h2>🏢 Control Tower Mas Tulung</h2>
            <p style="margin: 5px 0 0 0; font-size: 14px;">Pantauan Real-Time Seluruh Aktivitas Jasa</p>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 12px;">Status Server:</div>
            <div style="font-weight: bold; color: #2ecc71;">ONLINE 🟢</div>
        </div>
    </div>

    <div class="stats-container">
        <div class="stat-card blue">
            <div style="font-size: 14px; color: #7f8c8d;">Total Semua Pesanan</div>
            <div class="stat-angka" id="statTotal">0</div>
        </div>
        <div class="stat-card yellow">
            <div style="font-size: 14px; color: #7f8c8d;">Pesanan Menunggu (Terbuka)</div>
            <div class="stat-angka" id="statTerbuka">0</div>
        </div>
        <div class="stat-card green">
            <div style="font-size: 14px; color: #7f8c8d;">Pesanan Sedang Jalan (Diambil)</div>
            <div class="stat-angka" id="statJalan">0</div>
        </div>
    </div>

    <div class="table-container">
        <h3 style="margin-top: 0;">Log Perjalanan Pesanan</h3>
        <table>
            <thead>
                <tr>
                    <th>Waktu</th>
                    <th>Pelanggan</th>
                    <th>Layanan & Detail</th>
                    <th>Status</th>
                    <th>Driver Pemegang</th>
                    <th>Aksi Admin</th>
                </tr>
            </thead>
            <tbody id="tabelAdmin">
                </tbody>
        </table>
    </div>

<script type="module">
    // 1. Import modul Firebase (Tambah fungsi update untuk ubah status)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 2. Konfigurasi Firebase (SAMA PERSIS)
    const firebaseConfig = {
        apiKey: "AIzaSyCO4vDd6Z1NnrMx5gK7nMCyDceaGZj_bQw",
        authDomain: "mastulungmasgombong.firebaseapp.com",
        databaseURL: "https://mastulungmasgombong-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mastulungmasgombong",
        storageBucket: "mastulungmasgombong.firebasestorage.app",
        messagingSenderId: "4547691331",
        appId: "1:4547691331:web:45ecd39aab90f45b4f25f6"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // ==========================================
    // LOGIKA PANTAU SEMUA DATA (REAL-TIME)
    // ==========================================
    const ordersRef = ref(database, 'orders');

    onValue(ordersRef, (snapshot) => {
        const tabelBody = document.getElementById('tabelAdmin');
        tabelBody.innerHTML = ""; // Bersihkan tabel
        
        // Variabel untuk menghitung statistik
        let hitungTotal = 0;
        let hitungTerbuka = 0;
        let hitungDiambil = 0;

        // Balik urutan agar pesanan terbaru ada di paling atas (menggunakan array sementara)
        const semuaOrder = [];
        snapshot.forEach((child) => {
            semuaOrder.push({ id: child.key, ...child.val() });
        });
        semuaOrder.reverse(); // Urutkan dari yang terbaru

        // Tampilkan ke tabel & Hitung
        semuaOrder.forEach((data) => {
            hitungTotal++;
            if (data.status === "terbuka") hitungTerbuka++;
            if (data.status === "diambil") hitungDiambil++;

            const tr = document.createElement('tr');
            
            // Susun tombol aksi berdasarkan statusnya
            let tombolAksi = "-";
            if (data.status === "diambil") {
                tombolAksi = `<button class="btn-aksi" onclick="selesaikanOrder('${data.id}')">Tandai Selesai ✓</button>`;
            } else if (data.status === "terbuka") {
                tombolAksi = `<button class="btn-aksi btn-batal" onclick="batalkanOrder('${data.id}')">Batalkan X</button>`;
            }

            tr.innerHTML = `
                <td>${data.waktu_order}</td>
                <td><b>${data.customer_nama}</b><br><span style="font-size:12px;color:#7f8c8d;">${data.customer_wa}</span></td>
                <td><span style="font-weight:bold;">${data.layanan}</span><br>
                    <span style="font-size:12px;">➔ ${data.detail_1}</span><br>
                    <span style="font-size:12px;">➔ ${data.detail_2}</span>
                </td>
                <td><span class="badge ${data.status}">${data.status}</span></td>
                <td><b>${data.driver_nama ? data.driver_nama : '<span style="color:#e74c3c">Menunggu...</span>'}</b></td>
                <td>${tombolAksi}</td>
            `;
            tabelBody.appendChild(tr);
        });

        // Update angka di Kartu Statistik
        document.getElementById('statTotal').innerText = hitungTotal;
        document.getElementById('statTerbuka').innerText = hitungTerbuka;
        document.getElementById('statJalan').innerText = hitungDiambil;
    });

    // ==========================================
    // LOGIKA ADMIN: MENGUBAH STATUS ORDER
    // ==========================================
    
    // Fungsi mengubah status menjadi selesai (jika driver sudah menuntaskan tugas)
    window.selesaikanOrder = function(orderId) {
        if(confirm("Apakah Anda yakin pesanan ini sudah selesai dikerjakan driver?")) {
            const orderSpesifikRef = ref(database, 'orders/' + orderId);
            update(orderSpesifikRef, {
                status: "selesai"
            });
        }
    }

    // Fungsi membatalkan orderan (jika pelanggan cancel atau orderan tidak valid)
    window.batalkanOrder = function(orderId) {
        if(confirm("Yakin ingin membatalkan pesanan terbuka ini? Orderan akan ditarik dari layar driver.")) {
            const orderSpesifikRef = ref(database, 'orders/' + orderId);
            update(orderSpesifikRef, {
                status: "batal"
            });
        }
    }
</script>

</body>
</html>
